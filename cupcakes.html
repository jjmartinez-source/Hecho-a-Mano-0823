<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cupcakes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SOLO POPPINS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #fffafc;
  margin: 0;
}

/* HEADER (IGUAL A TODO) */
.header {
  display: flex;
  align-items: center;
  padding: 15px 20px;
}

.back-btn {
  text-decoration: none;
  color: #333;
  font-weight: 500;
  background: white;
  padding: 8px 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.back-btn:hover {
  background: #ffe4ec;
}

/* TITLE */
h1 {
  text-align: center;
  margin: 30px 0 20px;
  font-weight: 600;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  padding: 20px;
  max-width: 1100px;
  margin: auto;
}

/* CARD (CONSISTENTE) */
.card {
  background: #ffffff;
  padding: 15px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.05);
}

/* TEXT */
.price {
  margin-top: 10px;
  font-weight: 600;
  color: #333;
}

.no-price {
  margin-top: 10px;
  font-weight: 500;
  color: #888;
  font-style: italic;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.lightbox img {
  max-width: 95%;
  max-height: 95%;
  border-radius: 12px;
}
</style>
</head>

<body>

<!-- BOTÓN REGRESO -->
<div class="header">
  <a href="index.html" class="back-btn">← Volver al menú</a>
</div>

<h1>Cupcakes</h1>

<div class="gallery">

  <!-- MAIN MODEL -->
  <div class="card">
    <img src="images/cupcake2.png" onclick="openLightbox(this.src)">
    <div class="no-price">Modelo de referencia</div>
  </div>

  <!-- INDIVIDUAL 1 -->
  <div class="card">
    <img src="images/cupcake1.png" onclick="openLightbox(this.src)">
    <div class="price">Precio individual: L. 150</div>
  </div>

  <!-- INDIVIDUAL 2 -->
  <div class="card">
    <img src="images/cupcake4.png" onclick="openLightbox(this.src)">
    <div class="price">Precio individual: L. 150</div>
  </div>

  <!-- SET OF 4 -->
  <div class="card">
    <img src="images/cupcake3.png" onclick="openLightbox(this.src)">
    <div class="price">Set de 4 cupcakes: L. 500</div>
  </div>

  <!-- SET OF 2 -->
  <div class="card">
    <img src="images/cupcake5.png" onclick="openLightbox(this.src)">
    <div class="price">Set de 2 cupcakes: L. 250</div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
