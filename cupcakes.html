<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cupcakes</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #fffafc;
  text-align: center;
  margin: 0;
}

h1 {
  margin: 30px 0 10px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

/* TEXT */
.price {
  margin-top: 10px;
  font-weight: 600;
  color: #e07a9d;
}

.no-price {
  margin-top: 10px;
  font-weight: 500;
  color: #888;
  font-style: italic;
}

/* BACK BUTTON */
.back {
  display: inline-block;
  margin: 30px;
  text-decoration: none;
  color: #a67c52;
  font-weight: 600;
}
</style>
</head>

<body>

<h1>Cupcakes</h1>

<div class="gallery">

  <!-- MAIN MODEL (NO PRICE) -->
  <div class="card">
    <img src="images/cupcake2.png" alt="Cupcake modelo">
    <div class="no-price">Modelo de referencia</div>
  </div>

  <!-- INDIVIDUAL 1 -->
  <div class="card">
    <img src="images/cupcake1.png" alt="Cupcake individual">
    <div class="price">Precio individual: L. 150</div>
  </div>

  <!-- INDIVIDUAL 2 -->
  <div class="card">
    <img src="images/cupcake4.png" alt="Cupcake individual">
    <div class="price">Precio individual: L. 150</div>
  </div>

  <!-- SET OF 4 -->
  <div class="card">
    <img src="images/cupcake3.png" alt="Set de 4 cupcakes">
    <div class="price">Set de 4 cupcakes: L. 500</div>
  </div>

  <!-- SET OF 2 -->
  <div class="card">
    <img src="images/cupcake5.png" alt="Set de 2 cupcakes">
    <div class="price">Set de 2 cupcakes: L. 250</div>
  </div>

</div>

<a href="index.html" class="back">← Volver al inicio</a>

</body>
</html>
