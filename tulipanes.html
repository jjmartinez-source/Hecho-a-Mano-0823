<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tulipanes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fffafc;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 15px 20px;
}

.back-btn {
  text-decoration: none;
  color: #333;
  font-weight: 500;
  background: white;
  padding: 8px 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.back-btn:hover {
  background: #ffe4ec;
}

/* CONTENEDOR */
.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  font-weight: 600;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
}

/* TARJETAS */
.card {
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: translateY(-5px);
}

/* IMÁGENES */
.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  cursor: pointer;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.05);
}

/* TEXTO */
.info {
  padding: 15px;
  text-align: center;
}

.price {
  font-weight: 600;
  margin-top: 5px;
}

/* ETIQUETAS */
.tag {
  position: absolute;
  top: 10px;
  left: 10px;
  background: #ff9aa2;
  color: white;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 12px;
}

.tag.special {
  background: #ff6b81;
}

/* MODAL GENERAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 60px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal img {
  display: block;
  margin: auto;
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
}

/* CONTROLES LLAVERO */
.modal-control {
  position: absolute;
  color: white;
  font-size: 35px;
  cursor: pointer;
  user-select: none;
}

.close-btn {
  top: 20px;
  right: 30px;
}

.prev {
  top: 50%;
  left: 20px;
}

.next {
  top: 50%;
  right: 20px;
}
</style>
</head>

<body>

<!-- BOTÓN REGRESO -->
<div class="header">
  <a href="index.html" class="back-btn">← Volver al menú</a>
</div>

<div class="container">
<h1>Tulipanes</h1>

<div class="grid">

<!-- MODELO -->
<div class="card">
  <img src="images/tulipan-modelo.jpg" onclick="openModal(this.src)">
  <div class="info">
    <p>Modelo de tulipanes</p>
  </div>
</div>

<!-- RAMO DE 4 -->
<div class="card">
  <img src="images/ramo-4-tulipanes.jpg" onclick="openModal(this.src)">
  <div class="info">
    <p>Ramo de 4 tulipanes</p>
    <p class="price">L 500</p>
  </div>
</div>

<!-- PACK DE 3 (CAMBIADO A tulip1.jpg) -->
<div class="card">
  <div class="tag">Popular</div>
  <img src="images/tulip1.jpg" onclick="openModal(this.src)">
  <div class="info">
    <p>Pack de 3 tulipanes</p>
    <p class="price">L 375</p>
  </div>
</div>

<!-- INDIVIDUALES (CAMBIADO A tulip2.jpg) -->
<div class="card">
  <img src="images/tulip2.jpg" onclick="openModal(this.src)">
  <div class="info">
    <p>Tulipanes individuales</p>
    <p class="price">L 140 c/u</p>
  </div>
</div>

<!-- HELLO KITTY -->
<div class="card">
  <div class="tag special">Especial</div>
  <img src="images/tulipan-hello-kitty.jpg" onclick="openModal(this.src)">
  <div class="info">
    <p>Tulipán Hello Kitty</p>
    <p class="price">L 150</p>
  </div>
</div>

<!-- LLAVERO (GALERÍA) -->
<div class="card">
  <img src="images/llavero-tulipan-1.jpg" onclick="openLlaveroModal()">
  <div class="info">
    <p>Llavero de tulipán</p>
    <p class="price">L 120 c/u</p>
  </div>
</div>

</div>
</div>

<!-- MODAL NORMAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<!-- MODAL LLAVERO -->
<div id="llaveroModal" class="modal">
  <span class="modal-control close-btn" onclick="closeLlaveroModal()">✕</span>
  <span class="modal-control prev" onclick="prevImage()">❮</span>
  <img id="llaveroModalImg">
  <span class="modal-control next" onclick="nextImage()">❯</span>
</div>

<script>
function openModal(src) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalImg").src = src;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* LLAVERO GALERÍA */
let llaveroImages = [
  "images/llavero-tulipan-1.jpg",
  "images/llavero-tulipan-2.jpg"
];

let currentIndex = 0;

function openLlaveroModal() {
  document.getElementById("llaveroModal").style.display = "block";
  document.getElementById("llaveroModalImg").src = llaveroImages[currentIndex];
}

function closeLlaveroModal() {
  document.getElementById("llaveroModal").style.display = "none";
}

function nextImage() {
  currentIndex = (currentIndex + 1) % llaveroImages.length;
  document.getElementById("llaveroModalImg").src = llaveroImages[currentIndex];
}

function prevImage() {
  currentIndex = (currentIndex - 1 + llaveroImages.length) % llaveroImages.length;
  document.getElementById("llaveroModalImg").src = llaveroImages[currentIndex];
}
</script>

</body>
</html>
