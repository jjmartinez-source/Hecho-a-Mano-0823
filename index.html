<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hecho a Mano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fffafc;
  color: #333;
  text-align: center;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 1200px;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #ffd6e0, #ffe5b4, #d6f5ff);
  padding: 50px 20px 30px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #e07a9d;
}

/* SLIDER */
.slider {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  cursor: pointer;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.slide.active {
  opacity: 1;
}

/* DOTS */
.dots {
  position: absolute;
  bottom: 15px;
  width: 100%;
  text-align: center;
}

.dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  margin: 5px;
  background: #ffffffaa;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.dot.active {
  background: #ff5c8a;
  transform: scale(1.2);
}

/* NAV */
nav {
  background: #ffc8dd;
  padding: 15px;
}

nav a {
  padding: 10px 18px;
  margin: 0 8px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff8fab, #ffc8dd);
  color: #5a3e36;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover {
  background: linear-gradient(135deg, #ff5c8a, #ffafcc);
  color: white;
  transform: scale(1.1);
}

/* CTA */
.cta button {
  padding: 14px 25px;
  border-radius: 25px;
  border: none;
  background: #ff5c8a;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.cta button:hover {
  transform: scale(1.1);
}

/* ABOUT */
.about {
  max-width: 800px;
  margin: 50px auto;
  padding: 0 20px;
}

.about-logo {
  width: 160px;
  margin-bottom: 20px;
}

.about p {
  text-align: justify;
  line-height: 1.7;
  font-style: italic;
}

/* WHATSAPP */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px 20px;
  border-radius: 50px;
  cursor: pointer;
}

/* FOOTER */
footer {
  margin-top: 40px;
  padding: 20px;
  background: #e0f7fa;
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1 id="title">Hecho a Mano</h1>
  <p id="slogan">Hecho a mano… es hecho con amor</p>

  <div class="cta">
    <button onclick="sendWhatsApp()">Ordenar por WhatsApp</button>
  </div>
</header>

<!-- SLIDER -->
<div class="slider">

  <div class="slide active" onclick="goTo('llaveros.html')">
    <img src="images/llaveros.jpg">
  </div>

  <div class="slide" onclick="goTo('cupcakes.html')">
    <img src="images/cupcakes.jpg">
  </div>

  <div class="slide" onclick="goTo('munecas.html')">
    <img src="images/munecas.jpg">
  </div>

  <div class="slide" onclick="goTo('tulipanes.html')">
    <img src="images/tulipanes.jpg">
  </div>

  <div class="dots">
    <span class="dot active" onclick="currentSlide(0)"></span>
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
    <span class="dot" onclick="currentSlide(3)"></span>
  </div>

</div>

<nav>
  <a href="llaveros.html">Llaveros</a>
  <a href="cupcakes.html">Cupcakes</a>
  <a href="munecas.html">Muñecas</a>
  <a href="tulipanes.html">Tulipanes</a>
</nav>

<section class="about">
  <h2 id="aboutTitle">Sobre Nosotros</h2>

  <img src="images/logo.png" class="about-logo">

  <p id="p1"></p>
  <p id="p2"></p>
</section>

<footer>
  © 2026 Hecho a Mano
</footer>

</div>

<div class="whatsapp-float" onclick="sendWhatsApp()">
  WhatsApp
</div>

<script>
function sendWhatsApp() {
  let message = currentLang === "es"
    ? "Hola, me gustaría información sobre sus productos tejidos 🧶"
    : "Hello, I would like information about your handmade products 🧶";

  let url = "https://wa.link/31vzqd?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

const content = {
  es: {
    title: "Hecho a Mano",
    slogan: "Hecho a mano… es hecho con amor",
    aboutTitle: "Sobre Nosotros",
    p: [
      "Creamos piezas únicas tejidas a mano, donde cada puntada refleja dedicación, creatividad y amor por el detalle.",
      "Nuestro objetivo es compartir la belleza del crochet a través de productos y experiencias que conectan con las personas."
    ]
  },
  en: {
    title: "Handmade",
    slogan: "Handmade… made with love",
    aboutTitle: "About Us",
    p: [
      "We create unique handmade pieces where every stitch reflects care and creativity.",
      "Our goal is to share the beauty of crochet through products and meaningful experiences."
    ]
  }
};

let currentLang = "es";

function applyLanguage(lang) {
  document.getElementById("title").innerText = content[lang].title;
  document.getElementById("slogan").innerText = content[lang].slogan;
  document.getElementById("aboutTitle").innerText = content[lang].aboutTitle;

  document.getElementById("p1").innerText = content[lang].p[0];
  document.getElementById("p2").innerText = content[lang].p[1];
}

applyLanguage("es");

/* SLIDER LOGIC */
let slideIndex = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(index) {
  slides.forEach((slide, i) => {
    slide.classList.remove("active");
    dots[i].classList.remove("active");
  });

  slides[index].classList.add("active");
  dots[index].classList.add("active");
}

function nextSlide() {
  slideIndex = (slideIndex + 1) % slides.length;
  showSlide(slideIndex);
}

function currentSlide(index) {
  slideIndex = index;
  showSlide(slideIndex);
}

function goTo(page) {
  window.location.href = page;
}

setInterval(nextSlide, 3000);
</script>

</body>
</html>
