<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hecho a Mano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fffafc;
  color: #333;
  text-align: center;
  display: flex;
  justify-content: center;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 1200px;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #ffd6e0, #ffe5b4, #d6f5ff);
  padding: 60px 20px 40px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #e07a9d;
}

header p {
  margin-top: 10px;
}

/* NAV */
nav {
  background: #ffc8dd;
  padding: 14px;
}

nav a {
  color: #5a3e36;
  margin: 0 15px;
  text-decoration: none;
  font-weight: 500;
}

/* CTA BUTTON */
.cta {
  margin-top: 25px;
}

.cta button {
  padding: 14px 25px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background: #ff5c8a;
  color: white;
  cursor: pointer;
}

/* TOP BUTTONS */
.top-buttons {
  margin: 15px;
}

.top-buttons button {
  margin: 5px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: #ff8fab;
  color: white;
  cursor: pointer;
}

/* ABOUT */
.about {
  max-width: 900px;
  margin: 60px auto;
  padding: 0 20px;
}

.about-logo {
  width: 180px;
  margin-bottom: 30px;
}

.about p {
  text-align: justify;
  line-height: 1.8;
  font-style: italic;
}

/* FLOATING WHATSAPP */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px 20px;
  border-radius: 50px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* FOOTER */
footer {
  margin-top: 60px;
  padding: 20px;
  background: #e0f7fa;
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1 id="title">Hecho a Mano</h1>
  <p id="slogan">Hecho a mano… es hecho con amor</p>

  <!-- CTA PRINCIPAL -->
  <div class="cta">
    <button onclick="sendWhatsApp()">Ordenar por WhatsApp</button>
  </div>
</header>

<nav>
  <a href="llaveros.html">Llaveros</a>
  <a href="cupcakes.html">Cupcakes</a>
  <a href="munecas.html">Muñecas</a>
  <a href="tulipanes.html">Tulipanes</a>
</nav>

<div class="top-buttons">
  <button onclick="sendWhatsApp()">Contacto</button>
  <button onclick="toggleLanguage()">ES / EN</button>
</div>

<section class="about">
  <h2 id="aboutTitle">Sobre Nosotros</h2>

  <img src="images/logo.png" class="about-logo">

  <p id="p1"></p>
  <p id="p2"></p>
  <p id="p3"></p>
  <p id="p4"></p>
  <p id="p5"></p>
</section>

<footer>
  © 2026 Hecho a Mano
</footer>

</div>

<!-- BOTÓN FLOTANTE -->
<div class="whatsapp-float" onclick="sendWhatsApp()">
  WhatsApp
</div>

<script>
// MENSAJE AUTOMÁTICO
function sendWhatsApp() {
  let message = currentLang === "es"
    ? "Hola, me gustaría información sobre sus productos tejidos 🧶"
    : "Hello, I would like information about your handmade products 🧶";

  let url = "https://wa.link/31vzqd?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

// TEXT CONTENT (igual que antes)
const content = {
  es: {
    title: "Hecho a Mano",
    slogan: "Hecho a mano… es hecho con amor",
    aboutTitle: "Sobre Nosotros",
    p: [
      "Somos un emprendimiento pequeño con grandes ideas, donde cada creación nace desde el corazón y se transforma en algo único a través del arte de tejer. Todo comenzó como un hobby… un momento de calma, de curiosidad, de crear con las manos algo que antes solo existía en la imaginación.",
      "Poco a poco, ese pasatiempo se convirtió en una pasión, y esa pasión en un deseo más grande: compartir con otros la magia de tejer. Creemos que el crochet no es solo una técnica, sino una forma de expresión. Cada puntada cuenta una historia, cada pieza guarda tiempo, dedicación y cariño.",
      "Por eso, queremos que más personas descubran lo que nosotros sentimos al crear: la satisfacción de ver una idea cobrar vida.",
      "Ofrecemos clases de crochet para principiantes e intermedios en un ambiente creativo.",
      "Aquí no solo creamos, también enseñamos y crecemos juntos."
    ]
  },
  en: {
    title: "Handmade",
    slogan: "Handmade… made with love",
    aboutTitle: "About Us",
    p: [
      "We are a small business with big ideas where every creation is born from the heart.",
      "Our hobby became a passion and now we share the magic of crochet.",
      "We want people to feel the joy of creating.",
      "We offer crochet classes in a creative environment.",
      "We create, teach, and grow together."
    ]
  }
};

let currentLang = "es";

function applyLanguage(lang) {
  document.getElementById("title").innerText = content[lang].title;
  document.getElementById("slogan").innerText = content[lang].slogan;
  document.getElementById("aboutTitle").innerText = content[lang].aboutTitle;

  for (let i = 0; i < 5; i++) {
    document.getElementById("p" + (i + 1)).innerText = content[lang].p[i];
  }
}

function toggleLanguage() {
  currentLang = currentLang === "es" ? "en" : "es";
  applyLanguage(currentLang);
}

applyLanguage("es");
</script>

</body>
</html>
