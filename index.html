<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hecho a Mano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fffafc;
  color: #333;
  text-align: center;
  display: flex;
  justify-content: center;
}

/* VIEW CONTAINER */
.container {
  width: 100%;
  transition: all 0.3s ease;
  background: #fffafc;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #ffd6e0, #ffe5b4, #d6f5ff);
  padding: 60px 20px 40px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #e07a9d;
}

/* NAV */
nav {
  background: #ffc8dd;
  padding: 14px;
}

nav a {
  color: #5a3e36;
  margin: 0 15px;
  text-decoration: none;
  font-weight: 500;
}

/* BUTTONS */
.top-buttons {
  margin: 15px;
}

.top-buttons button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: #ff8fab;
  color: white;
  font-weight: 500;
}

/* ABOUT */
.about {
  max-width: 900px;
  margin: 60px auto;
  padding: 0 20px;
}

.about-logo {
  width: 180px;
  margin-bottom: 30px;
}

.about p {
  text-align: justify;
  line-height: 1.8;
  font-weight: 500;
  font-style: italic;
}

/* GRID */
.image-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.image-grid img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 50%;
}

/* FOOTER */
footer {
  margin-top: 60px;
  padding: 20px;
  background: #e0f7fa;
}

/* DEVICE MODES */
.mobile {
  width: 375px;
  min-height: 100vh;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

.tablet {
  width: 768px;
  min-height: 100vh;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

.desktop {
  width: 1200px;
  min-height: 100vh;
}
</style>
</head>

<body>

<div id="container" class="container desktop">

<header>
  <h1 id="title">Hecho a Mano</h1>
  <p id="slogan">Hecho a mano… es hecho con amor</p>
</header>

<nav>
  <a href="llaveros.html" id="nav1">Llaveros</a>
  <a href="cupcakes.html" id="nav2">Cupcakes</a>
  <a href="munecas.html" id="nav3">Muñecas</a>
  <a href="tulipanes.html" id="nav4">Tulipanes</a>
  <a href="otros.html" id="nav5">Otros</a>
</nav>

<div class="top-buttons">
  <button onclick="contact()">Contacto</button>
  <button onclick="toggleLanguage()">ES / EN</button>
  <button onclick="setView('mobile')">Teléfono</button>
  <button onclick="setView('tablet')">Tablet</button>
  <button onclick="setView('desktop')">Monitor</button>
</div>

<section class="about">
  <h2 id="aboutTitle">Sobre Nosotros</h2>

  <img src="images/logo.png" class="about-logo">

  <p id="p1"></p>
  <p id="p2"></p>
  <p id="p3"></p>
  <p id="p4"></p>
  <p id="p5"></p>

  <div class="image-grid">
    <img src="images/img1.jpg">
    <img src="images/img2.jpg">
    <img src="images/img3.jpg">
    <img src="images/img4.jpg">
  </div>

</section>

<footer>
  © 2026 Hecho a Mano
</footer>

</div>

<script>
// WHATSAPP
function contact() {
  window.open("https://wa.link/31vzqd", "_blank");
}

// TEXT CONTENT
const content = {
  es: {
    title: "Hecho a Mano",
    slogan: "Hecho a mano… es hecho con amor",
    aboutTitle: "Sobre Nosotros",
    nav: ["Llaveros", "Cupcakes", "Muñecas", "Tulipanes", "Otros"],
    p: [
      "Somos un emprendimiento pequeño con grandes ideas, donde cada creación nace desde el corazón y se transforma en algo único a través del arte de tejer. Todo comenzó como un hobby… un momento de calma, de curiosidad, de crear con las manos algo que antes solo existía en la imaginación.",
      "Poco a poco, ese pasatiempo se convirtió en una pasión, y esa pasión en un deseo más grande: compartir con otros la magia de tejer. Creemos que el crochet no es solo una técnica, sino una forma de expresión. Cada puntada cuenta una historia, cada pieza guarda tiempo, dedicación y cariño.",
      "Por eso, queremos que más personas descubran lo que nosotros sentimos al crear: la satisfacción de ver una idea cobrar vida. Desde amigurumis hasta proyectos completamente personalizados, incluso tus mascotas o ideas más especiales, trabajamos para convertir lo que imaginas en algo tangible, hecho completamente a mano.",
      "Además, abrimos las puertas a quienes quieran aprender este hermoso arte. Ofrecemos clases de crochet para principiantes y niveles intermedios, donde enseñamos desde lo más básico hasta técnicas más avanzadas, siempre en un ambiente cercano, paciente y creativo.",
      "Aquí no solo creamos, también enseñamos, compartimos y crecemos juntos. ¿Qué esperas para ver cómo tus ideas se tejen? Hecho a mano… es hecho con amor."
    ]
  },
  en: {
    title: "Handmade",
    slogan: "Handmade… made with love",
    aboutTitle: "About Us",
    nav: ["Keychains", "Cupcakes", "Dolls", "Tulips", "Others"],
    p: [
      "We are a small business with big ideas, where every creation is born from the heart and transformed into something unique through the art of crochet. It all began as a hobby… a moment of calm, curiosity, and creating with our hands something that once existed only in imagination.",
      "Little by little, that hobby became a passion, and that passion grew into a greater desire: to share with others the magic of crochet. We believe crochet is not just a technique, but a form of expression. Every stitch tells a story, every piece holds time, dedication, and love.",
      "That is why we want more people to discover what we feel when we create: the satisfaction of seeing an idea come to life. From amigurumis to fully personalized projects, even your pets or most special ideas, we work to transform what you imagine into something tangible, completely handmade.",
      "In addition, we open our doors to those who want to learn this beautiful art. We offer crochet classes for beginners and intermediate levels, teaching from the basics to more advanced techniques, always in a warm, patient, and creative environment.",
      "Here we do not only create, we also teach, share, and grow together. What are you waiting for to see how your ideas come to life? Handmade… is made with love."
    ]
  }
};

let currentLang = "es";

// APPLY TEXT
function applyLanguage(lang) {
  document.getElementById("title").innerText = content[lang].title;
  document.getElementById("slogan").innerText = content[lang].slogan;
  document.getElementById("aboutTitle").innerText = content[lang].aboutTitle;

  for (let i = 0; i < 5; i++) {
    document.getElementById("nav" + (i + 1)).innerText = content[lang].nav[i];
    document.getElementById("p" + (i + 1)).innerText = content[lang].p[i];
  }
}

// TOGGLE
function toggleLanguage() {
  currentLang = currentLang === "es" ? "en" : "es";
  applyLanguage(currentLang);
}

// VIEW
function setView(mode) {
  const container = document.getElementById("container");
  container.className = "container " + mode;
}

// INIT
applyLanguage("es");
</script>

</body>
</html>
