<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Llaveros</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f8f6f2;
  text-align: center;
  margin: 0;
}

/* Title */
h1 {
  margin: 30px 0 10px;
}

/* GRID (THIS FIXES YOUR ISSUE) */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

/* Card */
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Image */
img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

/* Price */
.price {
  margin-top: 10px;
  font-weight: 600;
  color: #a67c52;
}

/* Back button */
.back {
  display: inline-block;
  margin: 30px;
  text-decoration: none;
  color: #a67c52;
  font-weight: 600;
}
</style>
</head>

<body>

<h1>Llaveros</h1>

<div class="gallery">

  <div class="card">
    <img src="images/llavero1.png">
    <div class="price">Precio: L. ___</div>
  </div>

  <div class="card">

  </div>

  </div>

  <div class="card">
    <img src="images/llavero5.png">
    <div class="price">Precio: L. ___</div>
  </div>

  <div class="card">
    <img src="images/llavero6.png">
    <div class="price">Precio: L. ___</div>
  </div>

  <div class="card">

</div>

</html>
