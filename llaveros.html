<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Llaveros</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FUENTE CONSISTENTE -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  background: #fffafc;
  margin: 0;
}

/* HEADER IGUAL */
.header {
  display: flex;
  align-items: center;
  padding: 15px 20px;
}

.back-btn {
  text-decoration: none;
  color: #333;
  font-weight: 500;
  background: white;
  padding: 8px 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.back-btn:hover {
  background: #ffe4ec;
}

/* TITLE */
h1 {
  text-align: center;
  margin: 30px 0 20px;
  font-weight: 600;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 25px;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: #ffffff;
  border-radius: 18px;
  padding: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* IMAGE CONTAINER */
.image-container {
  width: 100%;
  height: 200px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BIG IMAGE */
.big .image-container {
  height: 260px;
}

/* IMAGE */
.card img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  cursor: pointer;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.05);
}

/* PRICE */
.price {
  margin-top: 12px;
  font-weight: 600;
  color: #333;
}

</style>
</head>

<body>

<!-- BOTÓN REGRESO -->
<div class="header">
  <a href="index.html" class="back-btn">← Volver al menú</a>
</div>

<h1>Llaveros</h1>

<div class="gallery">

  <!-- MAIN -->
  <div class="card big">
    <div class="image-container">
      <img src="images/llavero1.png" onclick="openLightbox(this.src)">
    </div>
    <div class="price">L 150</div>
  </div>

  <div class="card">
    <div class="image-container">
      <img src="images/llavero2.png" onclick="openLightbox(this.src)">
    </div>
    <div class="price">L 150</div>
  </div>

  <div class="card">
    <div class="image-container">
      <img src="images/llavero3.png" onclick="openLightbox(this.src)">
    </div>
    <div class="price">L 150</div>
  </div>

  <div class="card">
    <div class="image-container">
      <img src="images/llavero4.png" onclick="openLightbox(this.src)">
    </div>
    <div class="price">L 150</div>
  </div>

  <div class="card">
    <div class="image-container">
      <img src="images/llavero5.png" onclick="openLightbox(this.src)">
    </div>
    <div class="price">L 150</div>
  </div>

  <div class="card">
    <div class="image-container">
      <img src="images/llavero6.png" onclick="openLightbox(this.src)">
    </div>
    <div class="price">L 150</div>
  </div>

  <div class="card">
    <div class="image-container">
      <img src="images/llavero7.png" onclick="openLightbox(this.src)">
    </div>
    <div class="price">L 150</div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()" style="
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
">
  <img id="lightbox-img" style="
    max-width:95%;
    max-height:95%;
    border-radius:12px;
  ">
</div>

<script>
function openLightbox(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
