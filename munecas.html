<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Muñecas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FUENTE IGUAL QUE TULIPANES -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fffafc;
}

/* HEADER IGUAL */
.header {
  display: flex;
  align-items: center;
  padding: 15px 20px;
}

.back-btn {
  text-decoration: none;
  color: #333;
  font-weight: 500;
  background: white;
  padding: 8px 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.back-btn:hover {
  background: #ffe4ec;
}

/* CONTENEDOR */
.container {
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  font-weight: 600;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
}

/* TARJETAS (IGUAL QUE TULIPANES) */
.card {
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px);
}

/* IMAGEN */
.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

/* INFO */
.info {
  padding: 15px;
  text-align: center;
}

.name {
  font-weight: 600;
}

.price {
  margin-top: 5px;
  font-weight: 500;
}

/* MODAL (MISMA LÍNEA VISUAL) */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  overflow-y: auto;
  padding: 40px 20px;
}

/* CONTENIDO */
.modal-content {
  max-width: 600px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* IMÁGENES */
.modal-content img {
  width: 100%;
  max-height: 500px;
  object-fit: contain;
  border-radius: 10px;
  background: white;
}

/* BOTÓN CERRAR */
.close {
  position: fixed;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 35px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- BOTÓN REGRESO -->
<div class="header">
  <a href="index.html" class="back-btn">← Volver al menú</a>
</div>

<div class="container">
<h1>Muñecas</h1>

<div class="grid">

<!-- RAPUNZEL -->
<div class="card" onclick="openModal(['images/rapunzel1.png','images/rapunzel2.png','images/rapunzel3.png'])">
<img src="images/rapunzel1.png">
<div class="info">
<div class="name">Rapunzel</div>
<div class="price">L 1,300</div>
</div>
</div>

<!-- JASMINE -->
<div class="card" onclick="openModal(['images/jasmine1.png','images/jasmine2.png'])">
<img src="images/jasmine1.png">
<div class="info">
<div class="name">Princesa Jasmine</div>
<div class="price">L 1,300</div>
</div>
</div>

<!-- BELLA (CORREGIDO) -->
<div class="card" onclick="openModal([
'images/bella1.png',
'images/bella2new.png',
'images/bella3.png',
'images/bella4.png'
])">
<img src="images/bella1.png">
<div class="info">
<div class="name">Bella y Bestia</div>
<div class="price">L 2,400</div>
</div>
</div>

<!-- GATITA -->
<div class="card" onclick="openModal(['images/gatita1.png'])">
<img src="images/gatita1.png">
<div class="info">
<div class="name">Gatita</div>
<div class="price">L 1,300</div>
</div>
</div>

<!-- CLOSET -->
<div class="card" onclick="openModal(['images/closet1.png','images/closet2.png'])">
<img src="images/closet1.png">
<div class="info">
<div class="name">Muñequita con Closet</div>
<div class="price">L 1,500</div>
</div>
</div>

<!-- TINKERBELL -->
<div class="card" onclick="openModal(['images/tinkerbell1.png'])">
<img src="images/tinkerbell1.png">
<div class="info">
<div class="name">Campanita</div>
<div class="price">L 1,300</div>
</div>
</div>

<!-- BAILARINA -->
<div class="card" onclick="openModal(['images/bailarina1.png'])">
<img src="images/bailarina1.png">
<div class="info">
<div class="name">Bailarina</div>
<div class="price">L 350</div>
</div>
</div>

<!-- MR TOMATO -->
<div class="card" onclick="openModal(['images/tomato1.png'])">
<img src="images/tomato1.png">
<div class="info">
<div class="name">Mr. Tomato</div>
<div class="price">L 350</div>
</div>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="close" onclick="closeModal()">&times;</span>
<div id="modalContent" class="modal-content"></div>
</div>

<script>
function openModal(images) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  content.innerHTML = "";

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    content.appendChild(img);
  });

  modal.style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
